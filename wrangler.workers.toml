# wrangler.workers.toml — Cloudflare Workers configuration
# Used by manage-workers.yml: wrangler deploy --config wrangler.workers.toml
name = "bolt-echo"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Entry point for Workers deployment
main = "worker.js"

[env.production]
name = "bolt-echo"

[env.staging]
name = "bolt-echo-staging"

# Note: D1 database binding can be configured when needed
# Uncomment and configure the following when ready:
# [[d1_databases]]
# binding = "DB"
# database_name = "bolt-echo-db"
# database_id = "your-database-id-here"
