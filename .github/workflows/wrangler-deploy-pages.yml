name: Deploy Cloudflare Pages with Wrangler

on:
  push:
    branches:
      - main # Deploy when changes are pushed to the main branch
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Pages and Worker
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_API_KEY || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      # Step 1: Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set Up Node.js
      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3: Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      # Step 4: Install Dependencies
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Step 5: Validate Cloudflare credentials
      - name: Validate Cloudflare Credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "::error::Missing Cloudflare API token. Set one of: CLOUDFLARE_API_TOKEN, CLOUDFLARE_API_KEY, CF_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "::error::Missing Cloudflare account ID. Set one of: CLOUDFLARE_ACCOUNT_ID, CF_ACCOUNT_ID" && exit 1)

      # Step 6: Install Wrangler CLI (v4)
      - name: Install Wrangler
        run: pnpm add -g wrangler@4

      # Step 7: Build Project
      - name: Build Project
        run: pnpm run build:pages

      # Step 8: Verify build output exists
      - name: Verify Build Output
        run: test -d build/client && echo "✅ Build output found"

      # Step 9: Deploy to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy ./build/client --project-name bolt-echo
